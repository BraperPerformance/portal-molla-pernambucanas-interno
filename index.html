<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Você de Casa Nova · Acesso</title>
<style>
  :root{--blue:#0033a0;--blue-deep:#001f66;--blue-dark:#0a1f44;--yellow:#ffd200;--accent:#ffd200;--white:#fff;--muted:#9fb0d4;--line:rgba(255,255,255,.14);}
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;font-family:Arial,Helvetica,sans-serif;}
  /* ===== TELA DE LOGIN ===== */
  #login-screen{
    background:radial-gradient(circle at 82% 10%,rgba(255,210,0,.10),transparent 42%),
      radial-gradient(circle at 8% 88%,rgba(43,41,166,.34),transparent 48%),
      linear-gradient(135deg,#0a1f44 0%,#001f66 55%,#0033a0 100%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
  #login-screen::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;}
  .shell{position:relative;z-index:1;width:100%;max-width:440px;}
  .brandtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px;gap:16px;}
  .brandtop .molla{height:26px;}
  .brandtop .pern{background:#fff;border-radius:13px;padding:9px 13px;box-shadow:0 10px 28px rgba(0,0,0,.28);display:inline-flex;}
  .brandtop .pern img{height:42px;display:block;}
  .card{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:26px;padding:40px 34px;backdrop-filter:blur(14px);box-shadow:0 30px 70px rgba(0,0,0,.4);}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 15px;border-radius:999px;background:rgba(255,210,0,.16);border:1px solid rgba(255,210,0,.45);color:#ffe27a;font-size:11.5px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;margin-bottom:22px;}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.5);opacity:.5;}}
  h1.lg{color:#fff;font-size:27px;letter-spacing:-.8px;margin:0 0 10px;font-weight:800;}
  .sub{color:var(--muted);font-size:14.5px;line-height:1.5;margin:0 0 28px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
  .field input{width:100%;padding:14px 16px;border-radius:13px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:#fff;font-size:15px;font-family:inherit;transition:.2s;}
  .field input::placeholder{color:rgba(255,255,255,.35);}
  .field input:focus{outline:none;border-color:var(--accent);background:rgba(255,255,255,.1);}
  .btn{width:100%;padding:15px;border:none;border-radius:13px;background:linear-gradient(135deg,var(--yellow),#f3c400);color:#001f66;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.3px;transition:.2s;margin-top:8px;}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(255,210,0,.35);}
  .btn:active{transform:translateY(0);}
  .btn:disabled{opacity:.6;cursor:wait;transform:none;}
  .err{color:#ff9b9b;font-size:13.5px;margin-top:14px;min-height:18px;font-weight:600;text-align:center;opacity:0;transition:.2s;}
  .err.show{opacity:1;}
  .foot{text-align:center;color:rgba(255,255,255,.4);font-size:12px;margin-top:24px;}
  .lockrow{display:flex;align-items:center;gap:9px;justify-content:center;color:rgba(255,255,255,.45);font-size:12px;margin-top:18px;}
  .lockrow svg{width:13px;height:13px;fill:rgba(255,255,255,.45);}
  /* ===== BARRA DO DOCUMENTO (logado) ===== */
  #doc-screen{display:none;}
  #doc-bar{position:sticky;top:0;z-index:9999;display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:12px 22px;background:linear-gradient(135deg,#0a1f44,#001f66);border-bottom:1px solid rgba(255,255,255,.12);box-shadow:0 6px 20px rgba(0,0,0,.25);}
  #doc-bar .left{display:flex;align-items:center;gap:12px;min-width:0;}
  #doc-bar .molla{height:20px;flex-shrink:0;}
  #doc-bar .lbl{color:rgba(255,255,255,.75);font-size:13px;font-weight:700;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #doc-bar .lbl .badge{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#ffd200;border:1px solid rgba(255,210,0,.45);background:rgba(255,210,0,.16);padding:3px 8px;border-radius:999px;margin-right:8px;}
  #logout{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;flex-shrink:0;}
  #logout:hover{background:rgba(214,69,69,.85);border-color:transparent;}
  #logout svg{width:14px;height:14px;fill:currentColor;}
  #doc-content{width:100%;}
  @media(max-width:560px){#doc-bar .lbl{font-size:11px;}#doc-bar .lbl .badge{display:none;}}
</style></head>

    function b64ToBytes(b64){const bin=atob(b64);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return arr;}
    async function decryptContent(password){
      const salt=b64ToBytes(PAYLOAD.salt),iv=b64ToBytes(PAYLOAD.iv),ct=b64ToBytes(PAYLOAD.ct);
      const enc=new TextEncoder();
      const keyMat=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);
      const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:PAYLOAD.iter,hash:'SHA-256'},keyMat,{name:'AES-GCM',length:256},false,['decrypt']);
      const plainBuf=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct);
      return new TextDecoder().decode(plainBuf);
    }

    function injectDoc(fullHtml){
      const doc=new DOMParser().parseFromString(fullHtml,'text/html');
      // move os estilos do diagnostico para o head atual
      doc.querySelectorAll('style').forEach(s=>document.head.appendChild(s.cloneNode(true)));
      docContent.innerHTML=doc.body.innerHTML;
      // reexecuta os scripts do diagnostico (smooth scroll da nav)
      doc.body.querySelectorAll('script').forEach(old=>{
        const s=document.createElement('script');
        if(old.src)s.src=old.src; else s.textContent=old.textContent;
        docContent.appendChild(s);
      });
    }

    async function attempt(){
      const user=userEl.value.trim(),pass=passEl.value;
      errEl.classList.remove('show');
      if(!user){showErr('Informe um nome de acesso.');userEl.focus();return;}
      if(!pass){showErr('Informe a credencial.');passEl.focus();return;}
      btn.disabled=true;btn.textContent='Verificando…';
      try{
        const html=await decryptContent(pass);
        injectDoc(html);
        loginScreen.style.display='none';
        docScreen.style.display='block';
        window.scrollTo(0,0);
      }catch(e){
        btn.disabled=false;btn.textContent='Acessar diagnóstico';
        showErr('Credencial incorreta. Verifique e tente novamente.');
        passEl.value='';passEl.focus();
      }
    }
    function logout(){
      docScreen.style.display='none';
      docContent.innerHTML='';
      loginScreen.style.display='flex';
      btn.disabled=false;btn.textContent='Acessar diagnóstico';
      userEl.value='';passEl.value='';errEl.classList.remove('show');
      window.scrollTo(0,0);userEl.focus();
    }

    btn.addEventListener('click',attempt);
    document.getElementById('logout').addEventListener('click',logout);
    passEl.addEventListener('keydown',e=>{if(e.key==='Enter')attempt();});
    userEl.addEventListener('keydown',e=>{if(e.key==='Enter')passEl.focus();});
    userEl.focus();
  </script>
</body></html>
