<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área interna Molla · Acesso</title>
<style>
  :root{--yellow:#ffd200;--accent:#d64545;--muted:#9fb0d4;--line:rgba(255,255,255,.14);}
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;font-family:Arial,Helvetica,sans-serif;
    background:radial-gradient(circle at 82% 10%,rgba(255,210,0,.10),transparent 42%),
      radial-gradient(circle at 8% 88%,rgba(43,41,166,.34),transparent 48%),
      linear-gradient(135deg,#0a1f44 0%,#001f66 55%,#0033a0 100%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
  body::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;}
  .shell{position:relative;z-index:1;width:100%;max-width:440px;}
  .brandtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px;gap:16px;}
  .brandtop .molla{height:26px;}
  .brandtop .pern{background:#fff;border-radius:13px;padding:9px 13px;box-shadow:0 10px 28px rgba(0,0,0,.28);display:inline-flex;}
  .brandtop .pern img{height:42px;display:block;}
  .card{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:26px;padding:40px 34px;backdrop-filter:blur(14px);box-shadow:0 30px 70px rgba(0,0,0,.4);}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 15px;border-radius:999px;background:rgba(214,69,69,.16);border:1px solid rgba(214,69,69,.4);color:#ffb4b4;font-size:11.5px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;margin-bottom:22px;}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.5);opacity:.5;}}
  h1{color:#fff;font-size:27px;letter-spacing:-.8px;margin:0 0 10px;font-weight:800;}
  .sub{color:var(--muted);font-size:14.5px;line-height:1.5;margin:0 0 28px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
  .field input{width:100%;padding:14px 16px;border-radius:13px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:#fff;font-size:15px;font-family:inherit;transition:.2s;}
  .field input::placeholder{color:rgba(255,255,255,.35);}
  .field input:focus{outline:none;border-color:var(--accent);background:rgba(255,255,255,.1);}
  .btn{width:100%;padding:15px;border:none;border-radius:13px;background:linear-gradient(135deg,var(--yellow),#f3c400);color:#001f66;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.3px;transition:.2s;margin-top:8px;}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(255,210,0,.35);}
  .err{color:#ff9b9b;font-size:13.5px;margin-top:14px;min-height:18px;font-weight:600;text-align:center;opacity:0;transition:.2s;}
  .err.show{opacity:1;}
  .foot{text-align:center;color:rgba(255,255,255,.4);font-size:12px;margin-top:24px;}
</style></head>

      <h1>Área interna Molla</h1>
      <p class="sub">Acesso restrito ao diagnóstico interno da campanha. Uso exclusivo da equipe Molla.</p>
      <div class="field">
        <label for="user">Nome de acesso</label>
        <input id="user" type="text" placeholder="Digite seu nome" autocomplete="off">
      </div>
      <div class="field">
        <label for="pass">Credencial de equipe</label>
        <input id="pass" type="password" placeholder="••••••••••" autocomplete="off">
      </div>
      <button class="btn" id="go">Acessar diagnóstico</button>
      <div class="err" id="err"></div>
    </div>

  </div>
  <script>
    var SENHA = "moll@#2026#";
    var user=document.getElementById('user'), pass=document.getElementById('pass'), err=document.getElementById('err'), btn=document.getElementById('go');
    function entrar(){
      if(!user.value.trim()){err.textContent='Informe um nome de acesso.';err.classList.add('show');user.focus();return;}
      if(pass.value===SENHA){ window.location.href='diagnostico.html'; }
      else{ err.textContent='Credencial incorreta. Verifique e tente novamente.';err.classList.add('show');pass.value='';pass.focus(); }
    }
    btn.addEventListener('click',entrar);
    pass.addEventListener('keydown',function(e){if(e.key==='Enter')entrar();});
    user.addEventListener('keydown',function(e){if(e.key==='Enter')pass.focus();});
    user.focus();
  </script>
